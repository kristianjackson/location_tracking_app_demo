<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Location Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="map"></div>
  <div id="overlay"></div>

  <!-- Proximity UI containers (populated by proximity-ui.js at runtime) -->
  <div id="proximity-controls" aria-label="Proximity controls"></div>
  <div id="proximity-status" aria-label="Proximity connection status"></div>
  <div id="proximity-count" aria-label="Nearby user count"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
  <script type="module" src="app.js"></script>
</body>
</html>
